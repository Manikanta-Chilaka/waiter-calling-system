<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basil Bites · Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Brand fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

    <!-- SocketIO (served from our own origin) -->
    <script src="/static/socket.io.min.js"></script>
</head>

<body class="dashboard-bg">
    <nav class="navbar navbar-dark bb-navbar shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">🌿 BASIL BITES
                <small class="fw-normal" style="font-size:.9rem; opacity:.85;">· Manager</small></span>
            <span class="badge bg-danger" id="connectionStatus">Connecting…</span>
        </div>
    </nav>

    <div class="container">
        <!-- Summary -->
        <div class="row g-3 mb-4">
            <div class="col-4">
                <div class="card border-0 shadow-sm text-center h-100">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-primary" id="mgrActive">0</div>
                        <div class="small text-muted">Active Orders</div>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card border-0 shadow-sm text-center h-100">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-primary" id="mgrTables">0</div>
                        <div class="small text-muted">Tables</div>
                    </div>
                </div>
            </div>
            <div class="col-4">
                <div class="card border-0 shadow-sm text-center h-100">
                    <div class="card-body">
                        <div class="fs-3 fw-bold text-primary" id="mgrRevenue">₹0</div>
                        <div class="small text-muted">Total Sales</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Orders table -->
        <div class="card border-0 shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Table</th>
                            <th>Items</th>
                            <th>Total</th>
                            <th>Taken By</th>
                            <th>Status</th>
                            <th>Order</th>
                        </tr>
                    </thead>
                    <tbody id="managerOrders">
                        <tr><td colspan="6" class="text-center text-muted py-4">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        // Realtime overview — re-fetch on any order change.
        (function () {
            const b = document.getElementById('connectionStatus');
            if (typeof io === 'undefined') {
                b.textContent = 'Live updates off'; b.className = 'badge bg-secondary';
            } else {
                const socket = io({ transports: ['polling'], upgrade: false });
                socket.on('connect', () => { b.textContent = 'Connected'; b.className = 'badge bg-success'; });
                socket.on('disconnect', () => { b.textContent = 'Disconnected'; b.className = 'badge bg-danger'; });
                socket.on('new_order', loadManagerOrders);
                socket.on('order_updated', loadManagerOrders);
                socket.on('new_request', loadManagerOrders);
                socket.on('update_request', loadManagerOrders);
            }
            loadManagerOrders();
        })();
    </script>
</body>

</html>
