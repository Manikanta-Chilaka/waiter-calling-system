<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basil Bites · Staff Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Brand fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/static/style.css">

    <!-- SocketIO (served from our own origin so it works even where the CDN is blocked) -->
    <script src="/static/socket.io.min.js"></script>
</head>

<body class="dashboard-bg">
    <nav class="navbar navbar-dark bb-navbar shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">🌿 BASIL BITES <small class="fw-normal" style="font-size:.9rem; opacity:.85;">· Staff</small></span>
            <div>
                <button class="btn btn-outline-light btn-sm me-2 fw-bold" onclick="showStats()"><i class="bi bi-bar-chart-fill"></i> Performance Stats</button>
                <span class="badge text-bg-light me-2 fw-bold" id="staffIdDisplay"></span>
                <span class="badge bg-danger" id="connectionStatus">Disconnected</span>
            </div>
        </div>
    </nav>

    <div class="container">

        <!-- Modern segmented navigation -->
        <div class="nav-segment mb-4" role="tablist">
            <button type="button" class="nav-seg-btn active tab-btn" data-tab="callsTab">
                <i class="bi bi-bell-fill"></i>
                <span>Waiter Calls <span class="seg-count" id="callsCount">0</span></span>
            </button>
            <button type="button" class="nav-seg-btn tab-btn" data-tab="ordersTab">
                <i class="bi bi-basket-fill"></i>
                <span>Food Orders <span class="seg-count" id="ordersCount">0</span></span>
            </button>
        </div>

        <!-- ============ TAB 1: WAITER CALLS ============ -->
        <div id="callsTab" class="tab-pane">
            <h3 class="mb-4">Active Requests</h3>
            <div class="row" id="requestsContainer">
                <div class="text-center text-muted" id="noRequestsMsg">
                    <p>No active table requests right now.</p>
                </div>
            </div>
        </div>

        <!-- ============ TAB 2: FOOD ORDERS ============ -->
        <div id="ordersTab" class="tab-pane" style="display:none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="mb-0">Food Orders</h3>
                <button class="btn btn-primary fw-bold" data-bs-toggle="modal" data-bs-target="#takeOrderModal">
                    <i class="bi bi-plus-lg"></i> Take Order
                </button>
            </div>
            <div class="row" id="ordersContainer">
                <div class="text-center text-muted" id="noOrdersMsg">
                    <p>No food orders right now.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Template for Cloning (waiter calls) -->
    <template id="requestTemplate">
        <div class="col-md-4 mb-4 request-card">
            <div class="card rounded-3 h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold">Table <span class="table-number"></span></h5>
                    <p class="card-text status-text mb-4 text-warning">Waiting...</p>
                    <p class="small text-muted mb-2 time-ago">Just now</p>

                    <div class="mt-auto action-buttons">
                        <button class="btn btn-primary w-100 mb-2 accept-btn fw-bold">Accept Request</button>
                        <button class="btn btn-success w-100 complete-btn fw-bold" style="display:none;">Mark
                            Completed</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Take Order Modal (waiter enters an order at the table) -->
    <div class="modal fade" id="takeOrderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content bg-dark">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle text-primary"></i> Take Order</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Table Number</label>
                        <input type="number" min="1" class="form-control" id="staffOrderTable" placeholder="e.g. 1">
                    </div>
                    <div id="staffMenuContainer"><div class="text-muted">Loading menu…</div></div>
                </div>
                <div class="modal-footer justify-content-between">
                    <div class="fw-bold fs-5" id="staffOrderTotal">Total: ₹0</div>
                    <button class="btn btn-success fw-bold" onclick="submitStaffOrder()">
                        <i class="bi bi-check-lg"></i> Place Order
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div class="modal fade" id="statsModal" tabindex="-1" aria-labelledby="statsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="statsModalLabel"><i class="bi bi-graph-up text-primary"></i> Performance Stats</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="statsBody">
                    <div class="text-center">Loading stats...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/script.js"></script>
    <script>
        // Waiter Dashboard Logic
        // Polling-only: the server can't serve WebSocket, so skip the upgrade
        // to avoid Connected/Disconnected flapping on some networks.
        // Realtime is optional — the dashboard still loads calls/orders over
        // HTTP even if the live socket can't connect (refresh to see updates).
        function initRealtime() {
            const b = document.getElementById('connectionStatus');
            if (typeof io === 'undefined') {
                if (b) { b.textContent = 'Live updates off'; b.className = 'badge bg-secondary'; }
                return;
            }

            const socket = io({ transports: ['polling'], upgrade: false });

            socket.on('connect', () => {
                b.textContent = 'Connected'; b.className = 'badge bg-success';
            });
            socket.on('disconnect', () => {
                b.textContent = 'Disconnected'; b.className = 'badge bg-danger';
            });

            // ----- Waiter call events -----
            socket.on('new_request', (data) => {
                addRequestToDashboard(data);
                playNotificationSound();
            });
            socket.on('update_request', (data) => {
                updateRequestStatusUI(data);
            });

            // ----- Food order events -----
            socket.on('new_order', (order) => {
                addOrderToDashboard(order);
                playNotificationSound();
            });
            socket.on('order_updated', (order) => {
                updateOrderCard(order);
            });
        }
        initRealtime();

        // Tab switching (always works, socket or not)
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // Initial Load
        loadRequests();
        loadOrders();
        loadStaffMenu();  // menu for the "Take Order" modal
    </script>
</body>

</html>
