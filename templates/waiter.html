<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waiter Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body class="bg-dark text-white dashboard-bg">
    <nav class="navbar navbar-dark bg-black shadow-sm mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold"><i class="bi bi-bell"></i> Waiter Dashboard</span>
            <div>
                <span class="badge text-bg-light me-2 fw-bold" id="staffIdDisplay"></span>
                <span class="badge bg-danger" id="connectionStatus">Disconnected</span>
            </div>
        </div>
    </nav>

    <div class="container">
        <h3 class="mb-4">Active Requests</h3>

        <div class="row" id="requestsContainer">
            <!-- Templates will be injected here via JS -->
            <div class="text-center text-muted" id="noRequestsMsg">
                <p>No active table requests right now.</p>
            </div>
        </div>
    </div>

    <!-- Hidden Template for Cloning -->
    <template id="requestTemplate">
        <div class="col-md-4 mb-4 request-card">
            <div class="card bg-secondary text-white shadow rounded-3 h-100 border-0">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title fw-bold">Table <span class="table-number"></span></h5>
                    <p class="card-text status-text mb-4 text-warning">Waiting...</p>
                    <p class="small text-light mb-2 time-ago">Just now</p>

                    <div class="mt-auto action-buttons">
                        <button class="btn btn-primary w-100 mb-2 accept-btn fw-bold">Accept Request</button>
                        <button class="btn btn-success w-100 complete-btn fw-bold" style="display:none;">Mark
                            Completed</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="/static/script.js"></script>
    <script>
        // Waiter Dashboard Logic
        const socket = io();

        socket.on('connect', () => {
            document.getElementById('connectionStatus').textContent = 'Connected';
            document.getElementById('connectionStatus').className = 'badge bg-success';
        });

        socket.on('disconnect', () => {
            document.getElementById('connectionStatus').textContent = 'Disconnected';
            document.getElementById('connectionStatus').className = 'badge bg-danger';
        });

        // Initial Load
        loadRequests();

        // Socket Events
        socket.on('new_request', (data) => {
            addRequestToDashboard(data);
            playNotificationSound();
        });

        socket.on('update_request', (data) => {
            updateRequestStatusUI(data);
        });
    </script>
</body>

</html>
