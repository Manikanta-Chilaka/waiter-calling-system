<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table {{ table_id }} - Basil Bites</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Brand fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- SocketIO (served from our own origin so it works even where the CDN is blocked) -->
    <script src="/static/socket.io.min.js"></script>
</head>

<body class="bg-light customer-bg">

    <!-- Header with tab switcher -->
    <div class="container py-3" style="max-width: 720px;">
        <!-- Brand -->
        <div class="text-center cu2-header mb-3">
            <div class="cu2-logo">🌿 BASIL <span>BITES</span></div>
            <div class="cu2-tagline">Fresh Bites · Taramani</div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="fw-bold mb-0"><i class="bi bi-geo-alt-fill text-primary"></i> Table {{ table_id }}</h4>
            <span class="badge bg-secondary" id="connectionStatus">Connecting…</span>
        </div>

        <!-- Modern segmented navigation -->
        <div class="nav-segment mb-4" role="tablist">
            <button type="button" class="nav-seg-btn active tab-btn" data-tab="callTab">
                <i class="bi bi-bell-fill"></i><span>Call Waiter</span>
            </button>
            <button type="button" class="nav-seg-btn tab-btn" data-tab="menuTab">
                <i class="bi bi-egg-fried"></i><span>Menu</span>
            </button>
            <button type="button" class="nav-seg-btn tab-btn" data-tab="billTab">
                <i class="bi bi-receipt"></i><span>Bill</span>
            </button>
        </div>

        <!-- ============ TAB 1: CALL WAITER ============ -->
        <div id="callTab" class="tab-pane">
            <div class="card p-5 text-center shadow-lg rounded-4 interactive-card">
                <p class="text-muted mb-4 fs-5">Need assistance? Request a waiter instantly.</p>

                <button id="callWaiterBtn"
                        class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold shadow-sm call-btn"
                        onclick="callWaiter({{ table_id }})">
                    <i class="bi bi-bell-fill"></i> CALL WAITER
                </button>

                <div id="statusMessage" class="mt-4 text-success fw-semibold fs-5" style="display:none;">
                    Waiter is coming!
                </div>
                <div id="errorMessage" class="mt-4 text-danger fw-semibold fs-5" style="display:none;"></div>
            </div>
        </div>

        <!-- ============ TAB 2: MENU / ORDER FOOD ============ -->
        <div id="menuTab" class="tab-pane" style="display:none;">
            <!-- Live order status banner -->
            <div id="orderStatusBanner" class="alert alert-info d-none fw-semibold" role="alert"></div>

            <!-- Menu (rendered by JS) -->
            <div id="menuContainer">
                <div class="text-center text-muted py-5">Loading menu…</div>
            </div>
            <!-- Spacer so the fixed cart bar never hides the last item -->
            <div style="height: 90px;"></div>
        </div>

        <!-- ============ TAB 3: BILL ============ -->
        <div id="billTab" class="tab-pane" style="display:none;">
            <!-- Running summary of what the table has ordered -->
            <div id="billContainer">
                <div class="text-center text-muted py-5">Loading your bill…</div>
            </div>

            <!-- Formal generated bill / receipt (appears after tapping Generate Bill) -->
            <div id="receipt" class="d-none"></div>

            <div class="d-grid gap-2 mt-4">
                <button class="btn btn-success btn-lg rounded-pill fw-bold" onclick="payNow()">
                    <i class="bi bi-qr-code-scan"></i> Pay Now (UPI)
                </button>
                <button class="btn btn-outline-primary rounded-pill fw-bold" onclick="generateBill()">
                    <i class="bi bi-receipt-cutoff"></i> Generate Bill
                </button>
                <button id="printBillBtn" class="btn btn-outline-primary rounded-pill fw-bold d-none" onclick="printBill()">
                    <i class="bi bi-printer"></i> Print / Save as PDF
                </button>
                <button class="btn btn-outline-secondary rounded-pill fw-bold" onclick="requestBill({{ table_id }})">
                    <i class="bi bi-bell"></i> Request Bill from Staff
                </button>
            </div>
            <div id="payPanel" class="mt-3 d-none"></div>
            <div id="billRequestMsg" class="alert alert-success fw-semibold mt-3 d-none" role="alert"></div>
        </div>
    </div>

    <!-- ============ STICKY CART BAR ============ -->
    <div id="cartBar" class="fixed-bottom p-3" style="display:none;">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 720px;">
            <div>
                <span class="fw-bold" id="cartCount">0 items</span>
                <span class="ms-2 fs-5 fw-bold" id="cartTotal">₹0</span>
            </div>
            <button class="btn btn-success fw-bold rounded-pill px-4" id="placeOrderBtn"
                    onclick="placeOrder({{ table_id }})">
                <i class="bi bi-bag-check-fill"></i> Place Order
            </button>
        </div>
    </div>

    <!-- Main JS -->
    <script src="/static/script.js"></script>

    <script>
        // The table this page belongs to (from the URL).
        const TABLE_ID = {{ table_id }};
        window.TABLE_ID = TABLE_ID;

        // Realtime is optional — calling the waiter and ordering work over plain
        // HTTP, so the page stays usable even if the live socket can't connect.
        function initRealtime() {
            const b = document.getElementById('connectionStatus');
            if (typeof io === 'undefined') {
                if (b) { b.textContent = 'Live updates off'; b.className = 'badge bg-secondary'; }
                return;
            }

            // Polling-only: the server can't serve WebSocket, so skip the upgrade
            // to avoid Connected/Disconnected flapping on some networks.
            const socket = io({ transports: ['polling'], upgrade: false });

            socket.on('connect', () => {
                b.textContent = 'Connected'; b.className = 'badge bg-success';
            });
            socket.on('disconnect', () => {
                b.textContent = 'Offline'; b.className = 'badge bg-danger';
            });

            // Waiter accepted / completed a CALL for this table
            socket.on('update_request', function (data) {
                if (data.table_number != TABLE_ID) return;
                const msg = document.getElementById('statusMessage');
                if (data.status === 'accepted') {
                    msg.style.display = 'block';
                    msg.textContent = 'Waiter ' + (data.accepted_by || '') + ' is on their way!';
                    msg.className = 'mt-4 text-primary fw-bold fs-5';
                } else if (data.status === 'completed') {
                    const btn = document.getElementById('callWaiterBtn');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-bell-fill"></i> CALL WAITER';
                    msg.style.display = 'none';
                }
            });

            // Kitchen/waiter updated the status of one of THIS table's food orders
            socket.on('order_updated', function (order) {
                if (order.table_number != TABLE_ID) return;
                showOrderStatus(order);
            });

            // A new order was added to THIS table (e.g. the waiter took an order
            // at the table) — keep the running bill in sync.
            socket.on('new_order', function (order) {
                if (order.table_number != TABLE_ID) return;
                loadBill();
            });
        }
        initRealtime();

        // Tab switching (always works, socket or not)
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // Load the menu on first paint
        loadMenu();
    </script>

</body>

</html>
