<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer - Call Waiter</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- SocketIO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>

<body class="bg-light customer-bg">

    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
        <div class="card p-5 text-center shadow-lg rounded-4 interactive-card">

            <h1 class="mb-4 fw-bold text-dark">Table {{ table_id }}</h1>

            <p class="text-muted mb-4 fs-5">
                Need assistance? Request a waiter instantly.
            </p>

            <button
                id="callWaiterBtn"
                class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold shadow-sm call-btn"
                onclick="callWaiter({{ table_id }})">

                <i class="bi bi-bell-fill"></i> CALL WAITER
            </button>

            <div id="statusMessage"
                class="mt-4 text-success fw-semibold fs-5"
                style="display:none;">
                Waiter is coming!
            </div>

            <div id="errorMessage"
                class="mt-4 text-danger fw-semibold fs-5"
                style="display:none;">
            </div>

        </div>
    </div>

    <!-- Main JS -->
    <script src="/static/script.js"></script>

    <script>

        const socket = io();

        socket.on('update_request', function(data) {

            if (data.table_number == {{ table_id }} && data.status == 'accepted') {

                const msg = document.getElementById('statusMessage');
                msg.style.display = "block";
                msg.textContent = "Waiter " + (data.accepted_by || "") + " is on their way!";
                msg.className = "mt-4 text-primary fw-bold fs-5";

            }

            else if (data.table_number == {{ table_id }} && data.status == 'completed') {

                const btn = document.getElementById('callWaiterBtn');

                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-bell-fill"></i> CALL WAITER';

                document.getElementById('statusMessage').style.display = "none";

            }

        });

    </script>

</body>

</html>
